<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Race Platformer</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        const WIDTH = 800;
        const HEIGHT = 500;
        const GROUND_Y = 400;
        const FINISH_X = 720;

        // Player
        let playerX = 60;
        let playerY = GROUND_Y - 40;
        let velocityX = 0;
        let velocityY = 0;
        let onGround = true;

        let leftPressed = false;
        let rightPressed = false;
        let jumpPressed = false;

        // Physics
        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 4;
        const FRICTION = 0.8;

        // Game State
        let currentText = "";
        let showText = false;
        let nextTextAfterFinish = "";
        let finishLabel = "FINISH";
        let isUSAMode = true;
        let isSecondStage = false;

        let platforms = [];
        let killBlocks = [];

        // Story Texts
        const usa = `The US were in a fight towards advancements into the mysteries of space.\nThe US lost most of the firsts for their country.\nHowever, the US did something so advanced that we havent done it since.\nThe US won by putting the first man/men on the moon on July 20th, 1969 during\nthe Apollo 11 mission. In total, the Apollo missions costed over $25 billion.`;

        const ussr = `The USSR (also known as the Soviet Union) won in most of the firsts\nwhen it comes to space advancements. The Soviet Union put not only the first\nnational satellite into orbit but also put the first man in orbit.`;

        const yury = `The USSR were the first to put the first man into orbit,\nhis name was Yuri Gagarin. Sergei Krikalev was also sent into\norbit in May 1991. Unlike Gagarin, Krikalev wasn’t so lucky. He is known as\nthe last Soviet citizen and was stuck in space for nearly 2 years after the\nUSSR disbanded. He suffered huge psychological trauma.`;

        const alan = `Alan Shepard was the first American in space.\nHe flew aboard Freedom 7 on May 5, 1961, as part of Project Mercury.`;

        function createParkour() {
            platforms = [
                {x: 150, y: 320, width: 120, height: 15},
                {x: 320, y: 250, width: 100, height: 15},
                {x: 480, y: 300, width: 80, height: 15}
            ];
            randomizeKillBlocks();
        }

        function randomizeKillBlocks() {
            killBlocks = [
                {x: Math.random() * 400 + 150, y: 380, width: 500, height: 20},
                {x: Math.random() * 300 + 280, y: 200, width: 50, height: 20},
                {x: Math.random() * 250 + 450, y: 280, width: 70, height: 20}
            ];
        }

        function resetToStart() {
            playerX = 60;
            playerY = GROUND_Y - 40;
            velocityX = 0;
            velocityY = 0;
            onGround = true;
            randomizeKillBlocks();
        }

        function triggerFinish() {
            if (!isSecondStage) {
                currentText = nextTextAfterFinish;
                finishLabel = "HOME";
                isSecondStage = true;
                showText = true;
            } else {
                currentText = isUSAMode ? usa : ussr;
                finishLabel = isUSAMode ? "ALAN" : "YURY";
                isSecondStage = false;
                showText = false;
            }
        }

        function update() {
            if (leftPressed) velocityX = -MOVE_SPEED;
            else if (rightPressed) velocityX = MOVE_SPEED;
            else velocityX *= FRICTION;

            if (jumpPressed && onGround) {
                velocityY = JUMP_FORCE;
                onGround = false;
            }

            velocityY += GRAVITY;
            playerX += velocityX;
            playerY += velocityY;

            onGround = false;

            const playerRect = {x: playerX, y: playerY, width: 30, height: 40};

            if (playerY >= GROUND_Y - 40) {
                playerY = GROUND_Y - 40;
                velocityY = 0;
                onGround = true;
            }

            for (let p of platforms) {
                if (playerRect.x < p.x + p.width && playerRect.x + playerRect.width > p.x &&
                    playerRect.y < p.y + p.height && playerRect.y + playerRect.height > p.y && velocityY >= 0) {
                    playerY = p.y - 40;
                    velocityY = 0;
                    onGround = true;
                    break;
                }
            }

            if (playerX < 0) playerX = 0;
            if (playerX > WIDTH - 30) playerX = WIDTH - 30;

            for (let k of killBlocks) {
                if (playerRect.x < k.x + k.width && playerRect.x + playerRect.width > k.x &&
                    playerRect.y < k.y + k.height && playerRect.y + playerRect.height > k.y) {
                    resetToStart();
                    return;
                }
            }

            if (playerX + 30 >= FINISH_X) {
                triggerFinish();
                resetToStart();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            // Ground
            ctx.strokeStyle = '#3c3c3c';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            ctx.lineTo(WIDTH, GROUND_Y);
            ctx.stroke();

            // Platforms
            ctx.fillStyle = '#5a5a5a';
            for (let p of platforms) ctx.fillRect(p.x, p.y, p.width, p.height);

            // Kill Blocks
            ctx.fillStyle = '#b40000';
            for (let k of killBlocks) ctx.fillRect(k.x, k.y, k.width, k.height);

            // Finish
            ctx.strokeStyle = '#dc3232';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(FINISH_X, GROUND_Y - 80);
            ctx.lineTo(FINISH_X, GROUND_Y);
            ctx.stroke();

            ctx.fillStyle = '#dc3232';
            ctx.font = 'bold 14px sans-serif';
            const labelWidth = ctx.measureText(finishLabel).width;
            ctx.fillText(finishLabel, FINISH_X - labelWidth / 2, GROUND_Y - 90);

            // Player
            ctx.fillStyle = '#3278dc';
            ctx.beginPath();
            ctx.roundRect(playerX, playerY, 30, 40, 8);
            ctx.fill();

            // Instructions
            ctx.fillStyle = '#333';
            ctx.font = '12px sans-serif';
            ctx.fillText('Arrow keys / WASD to move | Up / W / Space to jump', 10, 25);
            ctx.fillText('Press 1: USA Cycle | 2: USSR Cycle', 10, 45);

            // Story Text
            if (showText && currentText) {
                ctx.fillStyle = 'black';
                ctx.font = '18px "Times New Roman", serif';
                const lines = currentText.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    ctx.fillText(lines[i], 20, 80 + i * 24);
                }
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Controls
        window.addEventListener('keydown', e => {
            switch(e.key.toLowerCase()) {
                case 'arrowleft': case 'a': leftPressed = true; break;
                case 'arrowright': case 'd': rightPressed = true; break;
                case 'arrowup': case 'w': case ' ': jumpPressed = true; break;
                case '1':
                    isUSAMode = true; isSecondStage = false; currentText = usa; 
                    nextTextAfterFinish = alan; finishLabel = "ALAN"; showText = true; 
                    resetToStart(); break;
                case '2':
                    isUSAMode = false; isSecondStage = false; currentText = ussr; 
                    nextTextAfterFinish = yury; finishLabel = "YURY"; showText = true; 
                    resetToStart(); break;
            }
        });

        window.addEventListener('keyup', e => {
            switch(e.key.toLowerCase()) {
                case 'arrowleft': case 'a': leftPressed = false; break;
                case 'arrowright': case 'd': rightPressed = false; break;
                case 'arrowup': case 'w': case ' ': jumpPressed = false; break;
            }
        });

        // Start Game
        createParkour();
        gameLoop();

        console.log("✅ Space Race Platformer Loaded!");
    </script>
</body>
</html>
